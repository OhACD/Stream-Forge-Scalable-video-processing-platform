apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: stream-forge-api
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "10"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      timeoutSeconds: 300
      serviceAccountName: stream-forge-api
      containers:
        - image: gcr.io/PROJECT_ID/stream-forge-api:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: HOST
              value: "0.0.0.0"
            - name: STREAM_FORGE_AUTH_MODE
              value: "firebase"
            - name: STREAM_FORGE_FIREBASE_PROJECT_ID
              value: "PROJECT_ID"
            - name: STREAM_FORGE_STORAGE_BUCKET
              value: "PROJECT_ID.appspot.com"
            - name: STREAM_FORGE_REPOSITORY
              value: "firestore"
            - name: STREAM_FORGE_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: stream-forge-redis-url
                  key: latest
            - name: STREAM_FORGE_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stream-forge-internal-token
                  key: latest
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
